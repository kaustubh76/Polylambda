# PolyLambda model parameters. Start CONSERVATIVE; FREEZE before the forward-test
# (see DECISIONS.md #11 — tuning 5 knobs on ~0-3 live dispute events is fitting noise).
# Publish lambda_star sensitivity curves from the historical replay, not one tuned point.

# --- Avellaneda-Stoikov (pricing/quote.py) ---
gamma: 0.5              # risk aversion (higher = wider spreads, faster inventory shedding)
k: 5.0                 # order-arrival / liquidity (higher = fills fall off faster from mid)
kappa: 1.0             # jump-premium weight  (NOTE: distinct from k)
min_horizon: 0.02      # (T-t)->0 guard: floor on effective horizon
boundary_floor: 0.002  # minimum price-space half-spread near 0/1
base_inventory_cap: 100.0

# --- sigma estimator (estimators/sigma.py) ---
ewma_b: 0.94           # EWMA memory knob (0-1): high = smooth/slow, low = twitchy/fast
shrinkage_strength: 0.5   # pull per-market sigma toward the category x price-level prior
min_trades_for_sigma: 20  # volume/trade-count floor (below this, use the prior)

# --- lambda engine (estimators/lambda_engine.py) ---
# SCALE BUG FIXED (2026-07-05): was 0.15, but the lambda signal is the CATEGORY DISPUTE BASE RATE
# (~0.0004-0.021 — see DATASET.md 5b), so 0.15 could never fire. 0.002 sits mid-grid of the replay's
# sensitivity curve (0.0005-0.01). Publish the curves, not this point (config/loader.py guards >0.05).
lambda_star: 0.002     # exit threshold for lambda_jump (reward-aware gate still applies)
lambda_v1: base_rate   # v1 scope: category base-rate + a few point-in-time-safe features
# E[loss|jump] scaling: CALIBRATED from the released dispute layer's realizedJumpLogit (mean |Δlogit|
# = 0.76 over 1,149 disputes, data/calibrate.py) — replaces the old 0.05 placeholder.
kappa_loss: 0.76

# --- execution sizing + inventory (execution/loop.py tick) ---
# SIZE ∝ 1/risk: size = quote_size * clamp(sigma_ref/sigma, size_floor, 1) / (1 + size_lambda_k*lambda_jump)
sigma_ref: 0.15                 # reference belief-vol: at sigma_ref (and lambda 0) size == quote_size
size_floor: 0.25                # size never shrinks below 25% of quote_size from the sigma term
size_lambda_k: 20.0             # lambda sensitivity of size (at lambda_jump 0.01 → size /1.2)
inventory_cap_horizon_days: 3.0 # hard position cap ramps to base_inventory_cap over this horizon;
                                # shrinks to ~0 at resolution so inventory can only DECREASE near T→0

# --- positioning (build the engine to support BOTH; ablation decides) ---
positioning: both      # reward_farmer | jump_avoid | both

# --- risk governor (execution/risk.py — gates every signed tx in testnet mode) ---
max_daily_loss_usd: 25.0        # halt signing when today's mark-to-market loss exceeds this
portfolio_gross_cap: 200.0      # halt signing when sum(|inventory|) across the fleet exceeds this
kill_switch_path: .data_cache/risk/KILL   # file existence = halt (cross-process; `touch` works)
max_consecutive_errors: 5       # RPC/send error breaker: open after N in a row, close on success
max_tx_per_day: 200             # signed-tx budget per UTC day
max_gas_pol_per_day: 0.6        # gas budget per UTC day (POL)
min_pol_balance: 0.02           # halt signing (clean "engine out of gas") when engine POL falls below this

# --- testnet adapter (execution/testnet_clob.py — gas/spam debounce + reorg guard) ---
min_requote_delta: 0.005        # re-post only when bid or ask moved by at least this
max_quote_age_s: 900.0          # ... or the standing on-chain quote is older than this
dispute_confirmations: 30       # accept live disputes only >= this many blocks deep (reorg guard)

# --- historical data layer (data/*, over the HF dataset via DuckDB) ---
data:
  source: hf                       # mirrors DATA_SOURCE; env wins if set
  fill_limit: 5000                 # per-market tape cap for sigma
  prior_min_markets_per_cell: 30   # (category x price-bucket) floor before trusting a sigma prior
  prior_sample_per_category: 2000  # stratified market sample for the prior corpus (1.85M is infeasible)
  control_ratio: 3                 # matched non-disputed controls per disputed market for the replay
