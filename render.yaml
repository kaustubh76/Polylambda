# Render blueprint — one-click deploy of the PolyLambda dashboard (Docker).
# In the Render dashboard: New → Blueprint → connect this repo. Render builds the Dockerfile,
# injects $PORT (the CMD honors it), and health-checks /api/health.
services:
  - type: web
    name: polylambda
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter            # 512MB/0.5CPU; bump to standard if you enable heavier workloads
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: MODE
        value: testnet
      # the continuous testnet execution engine: the production loop signing real Amoy txs from a
      # background thread (execution/testnet_keeper.py), risk-governed. Set 0 to disable.
      - key: KEEPER_AUTOSTART
        value: "1"
      - key: KEEPER_INTERVAL_S
        value: "60"
      # Live dispute feed = keyless Polygon RPC eth_getLogs scan (no indexer, no paid service).
      # The old Envio dev deploy ended; leave INDEXER_GRAPHQL_URL UNSET to use the RPC path. Set it
      # only if you stand up your own hosted indexer.
      - key: POLYGON_RPC_URL
        value: https://polygon.gateway.tenderly.co
      # --- testnet on-chain market (Polygon Amoy) ---
      - key: AMOY_RPC_URL
        value: https://polygon-amoy.drpc.org
      - key: AMOY_USDC_ADDRESS
        value: "0x41E94Eb019C0762f9Bfcf9Fb1E58725BfB0e7582"
      # engine wallet key that SIGNS the keeper's postQuote/flagDispute txns on Amoy — SECRET, set in
      # the dashboard. Without it, fleet reads still work; the keeper's signing goes "offline".
      - key: ENGINE_PRIVATE_KEY
        sync: false
      # HF read token — optional. The HF panels serve shipped precomputed JSON, so the app runs fine
      # without it; set it in the dashboard to authenticate any Hub read (the image ships no parquets).
      - key: HF_TOKEN
        sync: false
