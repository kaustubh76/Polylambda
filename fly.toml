# Fly.io app config for the PolyLambda dashboard.
# First time:  fly launch --copy-config --dockerfile Dockerfile   (creates the app, keeps this file)
# Deploy:      fly deploy
# Pick a unique app name if "polylambda" is taken.
app = "polylambda"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  MODE = "paper"
  INDEXER_GRAPHQL_URL = "https://indexer.dev.hyperindex.xyz/0638687/v1/graphql"
  AMOY_RPC_URL = "https://rpc-amoy.polygon.technology"
  AMOY_USDC_ADDRESS = "0x41E94Eb019C0762f9Bfcf9Fb1E58725BfB0e7582"
  MARKET_ADDRESS = "0xd5499e0d781b123724dF253776Aa1EB09780AfBf"
  # engine signer key is a SECRET: `fly secrets set ENGINE_PRIVATE_KEY=0x...`

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
