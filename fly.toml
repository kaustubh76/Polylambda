# Fly.io app config for the PolyLambda dashboard.
# First time:  fly launch --copy-config --dockerfile Dockerfile   (creates the app, keeps this file)
# Deploy:      fly deploy
# Pick a unique app name if "polylambda" is taken.
app = "polylambda"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  MODE = "paper"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
