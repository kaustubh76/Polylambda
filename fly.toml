# Fly.io app config for the PolyLambda dashboard.
# First time:  fly launch --copy-config --dockerfile Dockerfile   (creates the app, keeps this file)
# Deploy:      fly deploy
# Pick a unique app name if "polylambda" is taken.
app = "polylambda"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  MODE = "paper"
  # Live dispute feed = keyless Polygon RPC eth_getLogs scan (the old Envio dev deploy ended). Leave
  # INDEXER_GRAPHQL_URL unset to use the RPC path; set it only for your own hosted indexer.
  POLYGON_RPC_URL = "https://polygon.gateway.tenderly.co"
  AMOY_RPC_URL = "https://polygon-amoy.drpc.org"
  AMOY_USDC_ADDRESS = "0x41E94Eb019C0762f9Bfcf9Fb1E58725BfB0e7582"
  MARKET_ADDRESS = "0x1dBF7dA731e58C87B7e6644b719b84804F28b496"
  # engine signer key is a SECRET: `fly secrets set ENGINE_PRIVATE_KEY=0x...`
  # HF read token is a SECRET too (optional — the HF panels ship precomputed JSON):
  #   `fly secrets set HF_TOKEN=hf_...`

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    method = "GET"
    path = "/api/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
