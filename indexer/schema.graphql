## PolyLambda indexer schema.
## Corrected data model (see ../DECISIONS.md):
##  - conditionId = keccak256(adapter, questionId, 2); there is NO opaque requestId.
##  - ResolutionRequest is keyed by (conditionId + requestTimestamp) so each RESET round is a
##    distinct row (two-strikes: 1st dispute auto-resets, 2nd escalates to the DVM).
##  - Reconciliation lives Python-side (recon/check.py, vs the HF payout vectors) — not here.
##  - CLOB fills are NOT indexed here: the fill tape + tokenId→conditionId map come from the HF
##    dataset (data/fills.py). The dead Fill/TokenMap/ReconStatus entities were pruned with their
##    (already-removed) CTFExchange handlers.

type Market {
  id: ID!                 # = conditionId
  questionId: String!
  ancillaryData: String   # stamped ancillaryData (from adapter QuestionInitialized)
  oracle: String!         # the adapter address that prepared the condition
  outcomeSlotCount: Int!
  status: String!         # OPEN | REQUESTED | PROPOSED | DISPUTED | RESET | RESOLVED
  currentRound: Int!      # bumps on each QuestionReset (two-strikes); points at the live request
  finalOutcome: String    # payout vector once ConditionResolution fires (null until resolved)
  preparedAt: BigInt
  resolvedAt: BigInt
}

## Resolution lifecycle (OOv2/adapter handlers).
type ResolutionRequest {
  id: ID!                 # = conditionId + "-" + round  (distinct per reset round)
  market: Market!
  requestTimestamp: BigInt!
  round: Int!             # 0 = first request, 1 = after first (auto-reset) dispute, ...
  proposer: String
  bond: BigInt
  proposedPrice: String   # raw int256 from OO ProposePrice (1e18=YES, 0=NO, 5e17=UNRESOLVABLE)
  proposedOutcome: String # decoded: YES | NO | UNRESOLVABLE | OTHER
  status: String!         # REQUESTED | PROPOSED | DISPUTED | RESOLVED
}

type Dispute {
  id: ID!                 # = requestId + "-" + logIndex
  request: ResolutionRequest!
  disputer: String!
  disputeTs: BigInt!
  round: Int!
}

## ADAPTER-AGNOSTIC JOIN INDICES (so disputes link to conditionId WITHOUT keccak-deriving — which
## fails for NegRisk, whose questionIds come from NegRiskIdLib, not keccak(ancillary)):
##  - QuestionIndex: the authoritative questionId -> conditionId map, straight from the CTF
##    ConditionPreparation event (whose conditionId IS the HF conditionId). Works for every oracle.
##  - RequestIndex: (adapter + requestTimestamp) -> conditionId, from the adapter's QuestionInitialized;
##    an OO ProposePrice/DisputePrice/Settle carries (requester=adapter, timestamp=requestTimestamp),
##    so it looks up its conditionId here — no derivation needed.
type QuestionIndex {
  id: ID!                 # = questionId
  conditionId: String!
}

type RequestIndex {
  id: ID!                 # = lower(adapterAddress) + "-" + requestTimestamp
  conditionId: String!
}
