# Keeps the free-tier Render instance warm (it sleeps after ~15 min idle; every wake-up
# produces a burst of gateway 502s for whoever visits first) and doubles as an uptime check —
# a red run means the live demo is down.
name: keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: ping /api/health
        run: |
          # free-tier cold start can take ~1 min; retry before declaring the demo down.
          # URL is deployment-specific: Render assigned the -9lu2 suffix because the bare
          # `polylambda` subdomain is held by an older (suspended) service in another account.
          curl -sfS --retry 5 --retry-delay 15 --retry-all-errors --max-time 60 \
            https://polylambda-9lu2.onrender.com/api/health
