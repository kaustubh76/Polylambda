# Watchdog for the CONTINUOUS testnet keeper: every 15 min it asks the LIVE backend to run a keeper
# burst (the production loop → engine-signed postQuote/flagDispute on Polygon Amoy). If the keeper
# thread is already running (KEEPER_AUTOSTART=1) this is a no-op; if the free-tier instance was
# spun down or the thread died, the burst restarts it within ~15 min (self-heal). No GitHub secrets —
# the engine key lives on the Render service (ENGINE_PRIVATE_KEY); this is just an HTTP POST.
name: onchain-keepalive

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 min — self-heal a dead/cold-booted keeper (POST is idempotent)
  workflow_dispatch: {}

jobs:
  keeper-burst:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: run a keeper burst (idle-only; no-op when the keeper thread is alive)
        run: |
          # free-tier wake can take ~1 min; retry through it. Returns {started, running, ...}
          # immediately (the burst runs in a background thread server-side).
          curl -sfS --retry 5 --retry-delay 15 --retry-all-errors --max-time 90 \
            -X POST -H 'content-type: application/json' -d '{"ticks": 10}' \
            https://polylambda-9lu2.onrender.com/api/testnet/keeper/run
      - name: report keeper + risk status (visible in the run log)
        run: |
          curl -sfS --max-time 60 https://polylambda-9lu2.onrender.com/api/testnet/keeper | head -c 2000
